services:
  - type: web
    name: parvoz
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd parvoz && gunicorn parvoz.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DB_NAME
        fromDatabase:
          name: parvoz-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: parvoz-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: parvoz-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: parvoz-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: parvoz-db
          property: port

databases:
  - name: parvoz-db
    plan: free