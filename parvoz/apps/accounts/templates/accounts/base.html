{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Owl ERP Auth{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/erp-styles.css' %}">
  <style>
    body { background: linear-gradient(135deg, #f3f6fa 0%, #e8edf4 100%); position: relative; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 50%, rgba(0, 51, 102, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(0, 34, 68, 0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    .auth-container { position: relative; z-index: 1; }
    .auth-card { background: rgba(255, 255, 255, 0.96); box-shadow: 0 20px 30px -18px rgba(15, 23, 42, 0.18); transition: box-shadow 0.2s ease, transform 0.2s ease; }
    .auth-card:hover { transform: translateY(-1px); box-shadow: 0 24px 40px -24px rgba(15, 23, 42, 0.22); }
    .input-field:focus { box-shadow: 0 4px 12px rgba(0, 51, 102, 0.12); }
    .btn-primary { background: linear-gradient(135deg, #003366 0%, #002244 100%); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(0, 51, 102, 0.22); }
    .icon-wrapper { background: linear-gradient(135deg, rgba(0, 51, 102, 0.08) 0%, rgba(0, 34, 68, 0.08) 100%); }
    .min-h-screen { min-height: 100vh; }
    .max-w-md { max-width: 28rem; }
    .w-full { width: 100%; }
    .w-16 { width: 4rem; }
    .w-9 { width: 2.25rem; }
    .w-5 { width: 1.25rem; }
    .w-4 { width: 1rem; }
    .h-16 { height: 4rem; }
    .h-9 { height: 2.25rem; }
    .h-5 { height: 1.25rem; }
    .h-4 { height: 1rem; }
    .flex { display: flex; }
    .block { display: block; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .text-center { text-align: center; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .text-base { font-size: 1rem; line-height: 1.5rem; }
    .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .rounded { border-radius: 0.25rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-2xl { border-radius: 1rem; }
    .border { border-width: 1px; border-style: solid; }
    .border-2 { border-width: 2px; border-style: solid; }
    .border-t { border-top: 1px solid #e2e8f0; }
    .border-slate-200 { border-color: #e2e8f0; }
    .border-slate-300 { border-color: #cbd5e1; }
    .border-red-200 { border-color: #fecaca; }
    .border-red-300 { border-color: #fca5a5; }
    .border-blue-200 { border-color: #bfdbfe; }
    .bg-white { background: #fff; }
    .bg-red-50 { background: #fef2f2; }
    .bg-blue-50 { background: #eff6ff; }
    .text-white { color: #fff; }
    .text-primary { color: #003366; }
    .text-secondary { color: #002244; }
    .text-slate-900 { color: #0f172a; }
    .text-slate-700 { color: #334155; }
    .text-slate-600 { color: #475569; }
    .text-slate-500 { color: #64748b; }
    .text-red-800 { color: #991b1b; }
    .text-red-600 { color: #dc2626; }
    .text-blue-800 { color: #1e40af; }
    .cursor-pointer { cursor: pointer; }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1); }
    .flex-shrink-0 { flex-shrink: 0; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .py-3\.5 { padding-top: 0.875rem; padding-bottom: 0.875rem; }
    .p-4 { padding: 1rem; }
    .p-8 { padding: 2rem; }
    .pt-6 { padding-top: 1.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-5 { margin-bottom: 1.25rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mb-8 { margin-bottom: 2rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-6 { margin-top: 1.5rem; }
    .mt-8 { margin-top: 2rem; }
    .mt-0\.5 { margin-top: 0.125rem; }
    .ml-1 { margin-left: 0.25rem; }
    .space-x-1 > * + * { margin-left: 0.25rem; }
    .space-x-2 > * + * { margin-left: 0.5rem; }
    .space-x-3 > * + * { margin-left: 0.75rem; }
    .space-y-5 > * + * { margin-top: 1.25rem; }
    .tracking-\[0\.3em\] { letter-spacing: 0.3em; }
    .transition-colors { transition: color .2s ease, background-color .2s ease, border-color .2s ease; }
    .transition-all { transition: all .2s ease; }
    .duration-200 { transition-duration: .2s; }
    .focus\:outline-none:focus { outline: none; }
    .focus\:ring-2:focus { box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.15); }
    .focus\:ring-primary:focus { box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.15); }
    .focus\:ring-red-500:focus { box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2); }
    .focus\:border-primary:focus { border-color: #003366; }
    .focus\:border-red-500:focus { border-color: #ef4444; }
    .hover\:text-secondary:hover { color: #002244; }
    .hover\:text-slate-900:hover { color: #0f172a; }
    .disabled\:opacity-50:disabled { opacity: .5; }
    .disabled\:cursor-not-allowed:disabled { cursor: not-allowed; }
    .disabled\:hover\:transform-none:disabled:hover { transform: none; }
    button.w-full { display: block; }
    @media (min-width: 768px) { .md\:p-10 { padding: 2.5rem; } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-[system-ui] text-text">
  <div class="auth-container w-full max-w-md">{% block main %}{% endblock %}</div>
</body>
</html>
